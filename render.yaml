services:
  - type: web
    name: vader-trading-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ALPACA_PAPER
        value: "true"
    healthCheckPath: /api/docs
